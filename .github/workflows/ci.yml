name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  SUPABASE_URL: https://crqjedivobupxbbathux.supabase.co
  CLOUDFLARE_ACCOUNT_ID: 1e717a236c87cc50f0a396da20218343

jobs:
  # Static analysis for PHP (shop)
  php-lint:
    runs-on: ubuntu-latest
    if: contains(github.changed_files, 'php/')
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Install PHP_CodeSniffer
        run: |
          composer require squizlabs/php_codesniffer --dev --no-interaction
      - name: Lint PHP files
        run: |
          ./vendor/bin/phpcs --standard=PSR12 php/ -n --ignore=vendor

  # Trigger Cloudflare deployment (Next.js will build automatically)
  # Cloudflare Pages will detect Next.js and build from nextjs/ folder
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Cloudflare Deployment
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          projectName: rhineofficialsite
          branch: main