name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  SUPABASE_URL: https://crqjedivobupxbbathux.supabase.co
  CLOUDFLARE_ACCOUNT_ID: 1e717a236c87cc50f0a396da20218343

jobs:
  # Static analysis for PHP
  php-lint:
    runs-on: ubuntu-latest
    if: contains(github.changed_files, 'php/')
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Install PHP_CodeSniffer
        run: |
          composer require squizlabs/php_codesniffer --dev --no-interaction
      - name: Lint PHP files
        run: |
          ./vendor/bin/phpcs --standard=PSR12 php/ -n --ignore=vendor

  # Build and Deploy Next.js to Cloudflare Pages using Wrangler
  deploy-nextjs:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nextjs/package.json
      - name: Install dependencies
        run: npm ci
        working-directory: nextjs
      - name: Build Next.js
        run: npm run build
        working-directory: nextjs
      - name: Install Wrangler
        run: npm install -g wrangler
      - name: Deploy to Cloudflare Pages via Wrangler
        run: npx wrangler pages deploy nextjs/.vercel/output/static --project-name=rhineofficialsite
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}