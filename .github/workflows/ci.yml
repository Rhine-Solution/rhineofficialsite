name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  SUPABASE_URL: https://crqjedivobupxbbathux.supabase.co
  CLOUDFLARE_ACCOUNT_ID: 1e717a236c87cc50f0a396da20218343

jobs:
  # Static analysis for Python
  python-lint:
    runs-on: ubuntu-latest
    if: contains(github.changed_files, 'python/')
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install flake8
        run: pip install flake8 black
      - name: Lint Python files
        run: |
          flake8 python/ --count --max-line-length=127 --statistics
          black --check python/ --diff

  # Static analysis for PHP
  php-lint:
    runs-on: ubuntu-latest
    if: contains(github.changed_files, 'php/') || contains(github.changed_files, 'php2/')
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: Install PHP_CodeSniffer
        run: |
          composer require squizlabs/php_codesniffer --dev --no-interaction
      - name: Lint PHP files
        run: |
          ./vendor/bin/phpcs --standard=PSR12 php/ php2/ -n --ignore=vendor

  # Build Next.js project
  nextjs-build:
    runs-on: ubuntu-latest
    if: contains(github.changed_files, 'nextjs/')
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nextjs/package.json
      - name: Install dependencies
        run: npm ci
        working-directory: nextjs
      - name: Build project
        run: npm run build
        working-directory: nextjs
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: nextjs/.next
          retention-days: 1

  # Build Svelte project
  svelte-build:
    runs-on: ubuntu-latest
    if: contains(github.changed_files, 'svelte/')
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: svelte/package.json
      - name: Install dependencies
        run: npm ci
        working-directory: svelte
      - name: Build project
        run: npm run build
        working-directory: svelte

  # Deploy frontend to Cloudflare Pages
  deploy-frontend:
    needs: [nextjs-build, svelte-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          projectName: rhineofficialsite
          directory: frontend
          branch: main