<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0082D8" />
    <base href="/">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Rhine Solution - Building innovative digital solutions that transform businesses with cutting-edge web technologies including WebGPU, AI, Cloud, and Cybersecurity" />
    <meta name="keywords" content="web development, cloud infrastructure, AI, cybersecurity, blockchain, WebGPU, React, TypeScript, Rhine Solution" />
    <meta name="author" content="Rhine Solution" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0082D8" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Rhine Solution - Digital Innovation" />
    <meta property="og:description" content="Building innovative digital solutions that transform businesses with cutting-edge web technologies" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rhinesolution.com" />
    <meta property="og:site_name" content="Rhine Solution" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rhine Solution" />
    <meta name="twitter:description" content="Building innovative digital solutions" />
    
    <title>Rhine Solution | Next-Generation Digital</title>

    <!-- Loading Rubik font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;700;900&display=swap" rel="stylesheet">

    <!-- Load Tailwind entry CSS early (Vite will process this in dev and build) -->
    <link rel="stylesheet" href="/src/index.css">
    <link rel="stylesheet" href="/src/App.css">

    <!-- Critical CSS: minimal styles to avoid FOUC when Tailwind isn't applied yet -->
    <link rel="stylesheet" href="/critical.css">

    <style>
      /* This ensures the background is pitch black before the particles load */
      body {
        background-color: #000;
        margin: 0;
        overflow: hidden;
      }

      /* Hides dev GUI controls if they try to pop up */
      [class*="gui"] { 
        display: none !important; 
        visibility: hidden !important; 
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator && import.meta.env.PROD) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(registration => {
              console.log('SW registered:', registration);
            })
            .catch(error => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
